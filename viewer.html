<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbatube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #09090f;
    --surface:   #11111c;
    --surface2:  #181826;
    --border:    #1e1e2e;
    --border2:   #2a2a3e;
    --gold:      #c8a44a;
    --gold-dim:  #8a6f2e;
    --gold-glow: rgba(200, 164, 74, 0.12);
    --text:      #e2dcd0;
    --text-muted:#7a7a8e;
    --text-dim:  #48485a;
    --red:       #e05555;
    --green:     #55a878;
    --sidebar-w: 400px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 52px 1fr;
    height: 100vh;
  }

  /* ── TOPBAR ── */
  #topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
  }

  #logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    white-space: nowrap;
  }

  #logo span {
    color: var(--text-muted);
    font-weight: 300;
  }

  .top-divider { width: 1px; height: 20px; background: var(--border2); }

  #stats-bar {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }

  #stats-bar b { color: var(--text-muted); }

  .top-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #lang-filter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  #lang-filter:focus { border-color: var(--gold-dim); }

  /* ── SIDEBAR ── */
  #sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #search-wrap {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  #search-box {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    padding: 9px 14px 9px 36px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  #search-box:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 2px var(--gold-glow);
  }
  #search-box::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  .search-wrap-inner {
    position: relative;
  }

  #search-count {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 2px 0;
    min-height: 18px;
    transition: color 0.2s;
  }
  #search-count.has-results { color: var(--gold-dim); }

  /* Channel filter */
  #channel-filter-wrap {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .ch-tag {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 9px;
    border-radius: 2px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .ch-tag:hover { border-color: var(--gold-dim); color: var(--text); }
  .ch-tag.active {
    background: var(--gold-glow);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Video list */
  #video-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #video-list::-webkit-scrollbar { width: 4px; }
  #video-list::-webkit-scrollbar-track { background: transparent; }
  #video-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  #video-list::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .video-card {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .video-card:hover { background: var(--surface2); }
  .video-card.active {
    background: var(--gold-glow);
    border-left: 2px solid var(--gold);
    padding-left: 14px;
  }

  .thumb-wrap {
    flex-shrink: 0;
    width: 90px;
    height: 51px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--surface2);
    position: relative;
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 20px;
  }

  .thumb-duration {
    position: absolute;
    bottom: 2px;
    right: 3px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .card-meta {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-channel {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-date {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .card-snippet {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
    font-style: italic;
    margin-top: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-snippet mark {
    background: rgba(200,164,74,0.25);
    color: var(--gold);
    font-style: normal;
    border-radius: 1px;
    padding: 0 1px;
  }

  .lang-badge {
    display: inline-block;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── MAIN CONTENT ── */
  #main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text-muted); }
  .empty-sub { font-size: 13px; color: var(--text-dim); text-align: center; max-width: 340px; line-height: 1.6; }

  /* Video viewer */
  #viewer {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  #viewer.visible { display: flex; }

  #viewer-header {
    padding: 18px 32px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #viewer-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  #viewer-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .vm-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
  }

  .vm-item .icon { color: var(--text-dim); }

  .yt-link {
    margin-left: auto;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--gold-dim);
    padding: 4px 12px;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .yt-link:hover {
    background: var(--gold-glow);
    border-color: var(--gold);
  }

  /* Viewer toolbar */
  #viewer-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .tb-btn {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tb-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .tb-btn.active {
    background: var(--gold-glow);
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  #inline-search {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 3px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }
  #inline-search:focus { border-color: var(--gold-dim); }
  #inline-search::placeholder { color: var(--text-dim); }

  #match-nav {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
  }

  /* Subtitle content */
  #subtitle-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 32px 64px 64px;
  }

  #subtitle-scroll::-webkit-scrollbar { width: 5px; }
  #subtitle-scroll::-webkit-scrollbar-track { background: transparent; }
  #subtitle-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Loading */
  #loading-indicator {
    padding: 60px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Subtitle paragraphs */
  .subtitle-block {
    margin-bottom: 24px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .ts-gutter {
    flex-shrink: 0;
    width: 64px;
    text-align: right;
  }

  .ts-link {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .ts-link:hover { color: var(--gold); }

  .sub-text {
    flex: 1;
    font-family: 'Lora', serif;
    font-size: 15.5px;
    line-height: 1.75;
    color: var(--text);
  }

  .sub-text mark {
    background: rgba(200,164,74,0.2);
    color: var(--gold);
    border-radius: 2px;
    padding: 0 2px;
    font-style: normal;
  }

  .sub-text mark.current {
    background: rgba(200,164,74,0.45);
    outline: 1px solid var(--gold);
  }

  /* Clean mode (no timestamps) */
  .clean-paragraph {
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 1.4em;
    max-width: 680px;
  }

  /* Error */
  .error-msg {
    padding: 32px;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  /* No results */
  .no-results {
    padding: 60px 32px;
    text-align: center;
    color: var(--text-dim);
  }
  .no-results strong { color: var(--text-muted); }

  /* Loading screen */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  #loading-screen .logo-big {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-transform: uppercase;
  }
  #loading-screen .logo-big span { color: var(--text-muted); font-weight: 300; }
  #loading-screen .load-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  #loading-screen .load-bar-wrap {
    width: 200px;
    height: 2px;
    background: var(--border2);
    border-radius: 1px;
    overflow: hidden;
  }
  #loading-screen .load-bar {
    height: 100%;
    background: var(--gold);
    animation: loadpulse 1.2s ease-in-out infinite;
    transform-origin: left;
  }
  @keyframes loadpulse {
    0% { transform: scaleX(0); }
    50% { transform: scaleX(0.7); }
    100% { transform: scaleX(1); }
  }

  /* Scrollbar global */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="logo-big">Verba<span>tube</span></div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
  <div class="load-msg" id="load-msg">Cargando índice…</div>
</div>

<div id="app" style="display:none">

  <!-- TOPBAR -->
  <div id="topbar">
    <div id="logo">Verba<span>tube</span></div>
    <div class="top-divider"></div>
    <div id="stats-bar">—</div>
    <div class="top-right">
      <select id="lang-filter">
        <option value="">Todos los idiomas</option>
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">⌕</span>
        <input id="search-box" type="search" placeholder="Buscar en todos los subtítulos…" autocomplete="off" spellcheck="false">
      </div>
      <div id="search-count"></div>
    </div>
    <div id="channel-filter-wrap"></div>
    <div id="video-list"></div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Selecciona un vídeo</div>
      <div class="empty-sub">Elige un capítulo de la lista o usa el buscador para encontrar contenido específico dentro de todos los subtítulos.</div>
    </div>

    <div id="viewer">
      <div id="viewer-header">
        <div id="viewer-title"></div>
        <div id="viewer-meta"></div>
      </div>
      <div id="viewer-toolbar">
        <button class="tb-btn active" id="btn-clean">Sin timestamps</button>
        <button class="tb-btn" id="btn-ts">Con timestamps</button>
        <div style="flex:1"></div>
        <input id="inline-search" type="search" placeholder="Buscar en este vídeo…" autocomplete="off">
        <div id="match-nav"></div>
      </div>
      <div id="subtitle-scroll"></div>
    </div>
  </div>

</div>

<script>
// ── STATE ──
let index = null;
let filteredVideos = [];
let activeVideoId = null;
let activeChannel = null;
let activeLang = "";
let searchQuery = "";
let viewMode = "clean"; // "clean" | "ts"
let inlineQuery = "";
let inlineMatches = [];
let inlineCurrent = 0;
let loadedCues = []; // parsed cues for active video
let searchTimer = null;

// ── UTILS ──
function formatDate(d) {
  if (!d || d.length < 8) return "";
  return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
}

function escapeRx(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function secondsToTs(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function highlight(text, query) {
  if (!query) return text;
  const rx = new RegExp(`(${escapeRx(query)})`, 'gi');
  return text.replace(rx, '<mark>$1</mark>');
}

function getSnippet(fullText, query, len = 180) {
  if (!query) return fullText.slice(0, len) + (fullText.length > len ? '…' : '');
  const idx = fullText.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return fullText.slice(0, len) + '…';
  const start = Math.max(0, idx - 60);
  const end = Math.min(fullText.length, idx + len - 60);
  const snippet = (start > 0 ? '…' : '') + fullText.slice(start, end) + (end < fullText.length ? '…' : '');
  return highlight(snippet, query);
}

// ── LOAD INDEX ──
async function loadIndex() {
  try {
    setLoadMsg("Cargando verbatube.json…");
    const res = await fetch("verbatube.json?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    index = await res.json();
    setLoadMsg(`${index.total_videos} vídeos cargados`);
    setTimeout(() => {
      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("app").style.display = "";
      init();
    }, 400);
  } catch(e) {
    setLoadMsg("⚠ Error: " + e.message + " — ¿Ejecutaste indexer.py? ¿Está el servidor activo?");
  }
}

function setLoadMsg(msg) {
  document.getElementById("load-msg").textContent = msg;
}

// ── INIT ──
function init() {
  updateStats();
  buildChannelFilter();
  applyFilters();
  
  const searchBox = document.getElementById("search-box");
  searchBox.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = searchBox.value.trim();
      applyFilters();
    }, 280);
  });

  document.getElementById("lang-filter").addEventListener("change", e => {
    activeLang = e.target.value;
    applyFilters();
  });

  document.getElementById("btn-clean").addEventListener("click", () => setViewMode("clean"));
  document.getElementById("btn-ts").addEventListener("click", () => setViewMode("ts"));

  const inSrch = document.getElementById("inline-search");
  let inlineTimer;
  inSrch.addEventListener("input", () => {
    clearTimeout(inlineTimer);
    inlineTimer = setTimeout(() => {
      inlineQuery = inSrch.value.trim();
      renderSubtitleContent();
    }, 200);
  });
  inSrch.addEventListener("keydown", e => {
    if (e.key === "Enter") navigateMatches(e.shiftKey ? -1 : 1);
  });
}

function updateStats() {
  const channels = index.channels.length;
  const videos = index.total_videos;
  document.getElementById("stats-bar").innerHTML =
    `<b>${videos}</b> vídeos · <b>${channels}</b> canales`;
}

function buildChannelFilter() {
  const wrap = document.getElementById("channel-filter-wrap");
  wrap.innerHTML = "";

  const all = document.createElement("div");
  all.className = "ch-tag active";
  all.textContent = "Todos";
  all.dataset.ch = "";
  all.addEventListener("click", () => setChannel(""));
  wrap.appendChild(all);

  for (const ch of index.channels) {
    const tag = document.createElement("div");
    tag.className = "ch-tag";
    tag.textContent = `${ch.name} (${ch.count})`;
    tag.title = ch.name;
    tag.dataset.ch = ch.name;
    tag.addEventListener("click", () => setChannel(ch.name));
    wrap.appendChild(tag);
  }
}

function setChannel(ch) {
  activeChannel = ch || null;
  document.querySelectorAll(".ch-tag").forEach(t => {
    t.classList.toggle("active", t.dataset.ch === (ch || ""));
  });
  applyFilters();
}

// ── FILTERING ──
function applyFilters() {
  let videos = index.videos;

  if (activeChannel) {
    videos = videos.filter(v => v.channel === activeChannel);
  }

  if (activeLang) {
    videos = videos.filter(v => v.language === activeLang || v.languages_available?.includes(activeLang));
  }

  if (searchQuery.length >= 2) {
    const q = searchQuery.toLowerCase();
    videos = videos.filter(v =>
      v.title.toLowerCase().includes(q) ||
      v.full_text.toLowerCase().includes(q)
    );
  }

  filteredVideos = videos;
  renderVideoList();

  // Update search count
  const countEl = document.getElementById("search-count");
  if (searchQuery.length >= 2) {
    countEl.textContent = `${videos.length} resultado${videos.length !== 1 ? 's' : ''}`;
    countEl.className = videos.length > 0 ? "has-results" : "";
  } else {
    countEl.textContent = "";
    countEl.className = "";
  }
}

// ── VIDEO LIST ──
function renderVideoList() {
  const list = document.getElementById("video-list");
  list.innerHTML = "";

  if (filteredVideos.length === 0) {
    list.innerHTML = `<div class="no-results"><strong>Sin resultados</strong><br>Prueba con otra búsqueda o filtro</div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  for (const v of filteredVideos) {
    frag.appendChild(buildVideoCard(v));
  }
  list.appendChild(frag);
}

function buildVideoCard(v) {
  const card = document.createElement("div");
  card.className = "video-card" + (v.video_id === activeVideoId ? " active" : "");
  card.dataset.id = v.video_id;

  const snippet = searchQuery.length >= 2 ? getSnippet(v.full_text, searchQuery) : v.text_preview;

  card.innerHTML = `
    <div class="thumb-wrap">
      ${v.thumbnail
        ? `<img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>▶</div>'">`
        : `<div class="thumb-placeholder">▶</div>`}
      ${v.duration_fmt ? `<div class="thumb-duration">${v.duration_fmt}</div>` : ''}
    </div>
    <div class="card-meta">
      <div class="card-title">${v.title}</div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="card-channel">${v.channel}</div>
        <span class="lang-badge">${v.language || '?'}</span>
      </div>
      <div class="card-date">${formatDate(v.published)}</div>
      <div class="card-snippet">${snippet}</div>
    </div>
  `;

  card.addEventListener("click", () => loadVideo(v));
  return card;
}

// ── VIDEO LOADER ──
async function loadVideo(v) {
  // Update active state in list
  document.querySelectorAll(".video-card").forEach(c => {
    c.classList.toggle("active", c.dataset.id === v.video_id);
  });

  activeVideoId = v.video_id;

  // Show viewer
  document.getElementById("empty-state").style.display = "none";
  const viewer = document.getElementById("viewer");
  viewer.classList.add("visible");

  // Header
  document.getElementById("viewer-title").textContent = v.title;

  const ytSecs = 0;
  document.getElementById("viewer-meta").innerHTML = `
    <div class="vm-item"><span class="icon">◎</span>${v.channel}</div>
    ${v.published ? `<div class="vm-item"><span class="icon">◷</span>${formatDate(v.published)}</div>` : ''}
    ${v.duration_fmt ? `<div class="vm-item"><span class="icon">⏱</span>${v.duration_fmt}</div>` : ''}
    <div class="vm-item"><span class="lang-badge">${v.language || '?'}</span></div>
    <a class="yt-link" href="${v.url}" target="_blank" rel="noopener">▶ Ver en YouTube</a>
  `;

  // Clear inline search
  document.getElementById("inline-search").value = "";
  inlineQuery = "";
  inlineMatches = [];

  // Load VTT
  const scroll = document.getElementById("subtitle-scroll");
  scroll.innerHTML = `<div id="loading-indicator"><span class="spinner"></span>Cargando subtítulos…</div>`;

  try {
    const res = await fetch(v.subtitle_file + "?t=" + Date.now());
    if (!res.ok) throw new Error(`No se pudo cargar ${v.subtitle_file} (HTTP ${res.status})`);
    const vttText = await res.text();
    loadedCues = parseVTT(vttText);
    renderSubtitleContent();
  } catch(e) {
    // Fallback: usar full_text del JSON
    loadedCues = [];
    scroll.innerHTML = `
      <div class="error-msg">⚠ ${e.message}<br><br>Mostrando texto del índice (sin timestamps):</div>
      <div style="padding:0 64px 64px;max-width:680px">
        ${v.full_text.split(". ").map(s => `<p class="clean-paragraph">${s}.</p>`).join("")}
      </div>
    `;
  }
}

// ── VTT PARSER ──
function parseVTT(text) {
  const lines = text.split(/\r?\n/);
  const cues = [];
  const seen = new Set();
  let start = null, end = null, textLines = [];
  let inCue = false;

  const TS_RX = /(\d{2}):(\d{2}):(\d{2})\.(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})\.(\d{3})/;
  const TAG_RX = /<[^>]+>/g;
  const ENTITY_MAP = {'&amp;':'&','&lt;':'<','&gt;':'>','&nbsp;':' ','&#39;':"'"};

  function toSec(h,m,s,ms) { return +h*3600 + +m*60 + +s + +ms/1000; }

  function cleanLine(l) {
    return l
      .replace(TAG_RX, '')
      .replace(/&\w+;|&#\d+;/g, e => ENTITY_MAP[e] || e)
      .replace(/\s+/, ' ').trim();
  }

  for (const line of lines) {
    const m = TS_RX.exec(line);
    if (m) {
      if (start !== null && textLines.length) {
        const t = textLines.join(' ');
        if (t && !seen.has(t)) { cues.push({ start, end, text: t }); seen.add(t); }
      }
      start = toSec(m[1],m[2],m[3],m[4]);
      end   = toSec(m[5],m[6],m[7],m[8]);
      textLines = [];
      inCue = true;
      continue;
    }
    if (inCue) {
      if (line.trim() === '') {
        if (textLines.length) {
          const t = textLines.join(' ');
          if (t && !seen.has(t)) { cues.push({ start, end, text: t }); seen.add(t); }
        }
        inCue = false; start = null; textLines = [];
      } else {
        const cl = cleanLine(line);
        if (cl && !/^\d+$/.test(cl)) textLines.push(cl);
      }
    }
  }
  // Last cue
  if (start !== null && textLines.length) {
    const t = textLines.join(' ');
    if (t && !seen.has(t)) cues.push({ start, end, text: t });
  }
  return cues;
}

// ── GROUP CUES INTO PARAGRAPHS ──
function groupCues(cues, gapSec = 3.0) {
  if (!cues.length) return [];
  const groups = [];
  let current = { start: cues[0].start, end: cues[0].end, texts: [cues[0].text] };

  for (let i = 1; i < cues.length; i++) {
    const c = cues[i];
    const gap = c.start - current.end;
    if (gap <= gapSec) {
      current.end = c.end;
      current.texts.push(c.text);
    } else {
      groups.push(current);
      current = { start: c.start, end: c.end, texts: [c.text] };
    }
  }
  groups.push(current);
  return groups;
}

// ── RENDER SUBTITLE CONTENT ──
function renderSubtitleContent() {
  const scroll = document.getElementById("subtitle-scroll");
  inlineMatches = [];
  inlineCurrent = 0;

  if (!loadedCues.length) return;

  let html = "";

  if (viewMode === "clean") {
    // Group into readable paragraphs
    const groups = groupCues(loadedCues, 3.0);
    for (const g of groups) {
      const rawText = g.texts.join(' ');
      const text = inlineQuery ? highlight(rawText, inlineQuery) : rawText;
      html += `<p class="clean-paragraph">${text}</p>`;
    }
  } else {
    // Timestamped view
    for (const cue of loadedCues) {
      const tsStr = secondsToTs(cue.start);
      const vidId = activeVideoId;
      const ytUrl = `https://www.youtube.com/watch?v=${vidId}&t=${Math.floor(cue.start)}s`;
      const text = inlineQuery ? highlight(cue.text, inlineQuery) : cue.text;
      html += `
        <div class="subtitle-block">
          <div class="ts-gutter">
            <a class="ts-link" href="${ytUrl}" target="_blank" rel="noopener" title="Abrir en YouTube en este momento">${tsStr}</a>
          </div>
          <div class="sub-text">${text}</div>
        </div>
      `;
    }
  }

  scroll.innerHTML = html;

  // Collect mark elements for navigation
  if (inlineQuery) {
    inlineMatches = Array.from(scroll.querySelectorAll("mark"));
    if (inlineMatches.length > 0) {
      navigateMatches(0, true);
    }
    document.getElementById("match-nav").textContent =
      inlineMatches.length > 0
        ? `${inlineCurrent+1}/${inlineMatches.length}`
        : "Sin resultados";
  } else {
    document.getElementById("match-nav").textContent = "";
  }
}

function navigateMatches(delta, absolute = false) {
  if (!inlineMatches.length) return;

  inlineMatches[inlineCurrent]?.classList.remove("current");

  if (absolute) {
    inlineCurrent = 0;
  } else {
    inlineCurrent = (inlineCurrent + delta + inlineMatches.length) % inlineMatches.length;
  }

  const el = inlineMatches[inlineCurrent];
  el?.classList.add("current");
  el?.scrollIntoView({ behavior: "smooth", block: "center" });

  document.getElementById("match-nav").textContent =
    `${inlineCurrent+1}/${inlineMatches.length}`;
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById("btn-clean").classList.toggle("active", mode === "clean");
  document.getElementById("btn-ts").classList.toggle("active", mode === "ts");
  if (loadedCues.length) renderSubtitleContent();
}

// ── BOOT ──
loadIndex();
</script>
